# VPE Agenda Schedule Engine — nginx server block
# Place this in /etc/nginx/sites-available/vpe-agenda
# then: sudo ln -s /etc/nginx/sites-available/vpe-agenda /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # replace _ with your domain or EC2 public IP

    root /var/www/vpe-agenda;
    index index.html;

    # SPA fallback — return index.html for any path not matching a file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset files (JS/CSS) — cache 1 year, immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # HTML — never cache (so index.html always pulls latest)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
